<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KrishiVani - Voice Interaction Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#52b781",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151d19",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(82, 183, 129, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 183, 129, 0.2);
        }
        .gradient-mesh {
            background-color: #151d19;
            background-image: 
                radial-gradient(at 0% 0%, rgba(82, 183, 129, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(82, 183, 129, 0.1) 0px, transparent 50%);
        }
        .sound-wave-container {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 40px;
        }
        .sound-bar {
            width: 3px;
            background-color: #52b781;
            border-radius: 99px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden">
<!-- Background Layers -->
<div class="fixed inset-0 gradient-mesh -z-10"></div>
<!-- Top Branding -->
<header class="p-8 flex justify-between items-center">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
<span class="material-icons text-white">eco</span>
</div>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">KrishiVani</span>
</div>
<button class="text-sm font-medium text-primary/80 hover:text-primary transition-colors">Skip</button>
</header>
<!-- Main Content Area: Fluid Layout -->
<main class="flex-1 flex flex-col relative px-6 md:px-12">
<!-- Illustration Section -->
<div class="relative flex-1 flex flex-col items-center justify-center py-4">
<!-- Main Image Wrapper -->
<div class="relative w-full max-w-md aspect-square">
<!-- Decorative Glows -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-72 h-72 bg-primary/20 rounded-full blur-[80px]"></div>
<img alt="Farmer talking into a phone" class="w-full h-full object-cover rounded-3xl shadow-2xl border border-primary/10" data-alt="Indian farmer using smartphone in lush green field" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWuO54xz-8Rcdw-ciuqTC-S-tfiPYDe8RjsWm_9a7nRtaIH9o-ddropUt-fnuG3iFu3whASLqoSCOX7BflniO-nJibuo0jyP2vqD8PcW5cF7mweyy13FpaUAFpTGxf4N3WlLys9g7XpLaiIfDuJhwbFuUVWUQp3Y5VsQT653zxrih6Gi6E59uSsHQexnDHWFNFBlzgylM7UyJI18Bd3Ubo_YdZLd-xZIU_quu2rq2OFHEtWfHG0A99C80rGDxNzXo_OyKBVNfDO-91"/>
<!-- Voice Wave Overlay -->
<div class="absolute -bottom-6 left-1/2 -translate-x-1/2 glass-effect px-8 py-4 rounded-2xl flex items-center gap-6 border border-primary/30">
<div class="sound-wave-container">
<div class="sound-bar h-4"></div>
<div class="sound-bar h-8"></div>
<div class="sound-bar h-10"></div>
<div class="sound-bar h-6"></div>
<div class="sound-bar h-9"></div>
<div class="sound-bar h-5"></div>
<div class="sound-bar h-7"></div>
</div>
<div class="bg-primary p-2 rounded-full">
<span class="material-icons text-white text-base">mic</span>
</div>
</div>
</div>
</div>
<!-- Text Content Section -->
<div class="py-12 flex flex-col items-center text-center space-y-6">
<div class="space-y-4">
<h1 class="text-3xl font-bold tracking-tight leading-tight">
                    Talk to your crops
                </h1>
<!-- Translations with different accent weights -->
<div class="flex flex-col gap-2 opacity-80">
<p class="text-lg font-medium">अपनी फसलों से बात करें (Hindi)</p>
<p class="text-lg font-medium">તમારા પાક સાથે વાત કરો (Gujarati)</p>
<p class="text-lg font-medium">ਆਪਣੀਆਂ ਫਸਲਾਂ ਨਾਲ ਗੱਲ ਕਰੋ (Punjabi)</p>
</div>
</div>
<!-- Description -->
<p class="text-slate-600 dark:text-slate-400 max-w-xs">
                Ask questions about your farm in your native language and get expert AI advice instantly.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="p-8 pb-12 flex flex-col items-center gap-8">
<!-- Progress Dots -->
<div class="flex gap-3 items-center">
<div class="w-8 h-2 bg-primary rounded-full"></div>
<div class="w-2 h-2 bg-primary/20 rounded-full"></div>
<div class="w-2 h-2 bg-primary/20 rounded-full"></div>
</div>
<!-- Glassmorphic Next Button -->
<button class="glass-effect w-full max-w-sm py-4 rounded-xl flex items-center justify-center gap-3 text-lg font-semibold text-slate-900 dark:text-white hover:bg-primary/25 transition-all active:scale-[0.98]">
<span>Continue</span>
<span class="material-icons">arrow_forward</span>
</button>
</footer>
</body></html>
