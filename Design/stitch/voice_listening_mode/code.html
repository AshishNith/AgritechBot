<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice Interaction Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#52b781",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151d19",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Top App Bar Component -->
<div class="flex items-center p-6 justify-between z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-3xl">close</span>
</div>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center rounded-full bg-transparent text-slate-900 dark:text-slate-100 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-3xl">settings</span>
</button>
</div>
</div>
<!-- Immersive Visualization Area -->
<div class="flex-1 flex flex-col items-center justify-center relative px-6">
<!-- Concentric Waves Animation Simulation -->
<div class="relative flex items-center justify-center w-full max-w-md aspect-square">
<!-- Outer Glow/Wave -->
<div class="absolute w-full h-full rounded-full border-2 border-primary/10 bg-primary/5 scale-110"></div>
<!-- Middle Wave -->
<div class="absolute w-4/5 h-4/5 rounded-full border-2 border-primary/20 bg-primary/10 scale-105"></div>
<!-- Inner Active Wave -->
<div class="absolute w-3/5 h-3/5 rounded-full border-4 border-primary/40 bg-primary/20 shadow-[0_0_80px_rgba(82,183,129,0.3)]"></div>
<!-- Central Icon/Avatar -->
<div class="relative z-10 flex items-center justify-center w-32 h-32 rounded-full bg-primary shadow-[0_0_40px_rgba(82,183,129,0.6)]">
<span class="material-symbols-outlined text-white text-5xl">mic</span>
</div>
</div>
<!-- Text Content -->
<div class="mt-16 text-center z-10">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-4xl md:text-5xl font-bold leading-tight mb-4">
                    Listening...
                </h1>
<div class="space-y-2">
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium">सुन रहे हैं...</p>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium">સાંભળી રહ્યા છીએ...</p>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium">ਸੁਣ ਰਹੇ ਹਾਂ...</p>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="flex flex-col items-center justify-center p-12 gap-6 z-10">
<!-- Progress / Audio Visualizer Bar -->
<div class="flex gap-1 items-end h-8 mb-4">
<div class="w-1.5 h-3 bg-primary/40 rounded-full"></div>
<div class="w-1.5 h-6 bg-primary/60 rounded-full"></div>
<div class="w-1.5 h-4 bg-primary/80 rounded-full"></div>
<div class="w-1.5 h-8 bg-primary rounded-full"></div>
<div class="w-1.5 h-5 bg-primary/70 rounded-full"></div>
<div class="w-1.5 h-7 bg-primary/50 rounded-full"></div>
<div class="w-1.5 h-4 bg-primary/30 rounded-full"></div>
</div>
<button class="flex min-w-[200px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-8 bg-primary/20 text-primary hover:bg-primary/30 transition-all gap-3 border border-primary/20">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">pause</span>
<span class="text-lg font-bold tracking-wide uppercase">Tap to pause</span>
</button>
</div>
<!-- Ambient Background Decoration -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] pointer-events-none opacity-20 dark:opacity-10 overflow-hidden">
<div class="w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary via-transparent to-transparent blur-3xl"></div>
</div>
</div>
</body></html>
