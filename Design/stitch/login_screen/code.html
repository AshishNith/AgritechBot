<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Signup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#52b781",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151d19",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(82, 183, 129, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 183, 129, 0.1);
        }
        .fluid-bg {
            background: radial-gradient(circle at 0% 0%, rgba(82, 183, 129, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(82, 183, 129, 0.1) 0%, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-hidden fluid-bg">
<header class="flex items-center p-6 justify-between">
<button class="flex size-10 items-center justify-center rounded-full glass-effect hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-background-dark text-xl">shield_person</span>
</div>
<span class="font-bold tracking-tight text-lg">SecureAccess</span>
</div>
<div class="w-10"></div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 max-w-md mx-auto w-full">
<div class="w-full text-center mb-10">
<h1 class="text-slate-900 dark:text-white text-4xl font-bold leading-tight mb-4">
                    Welcome back
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-lg">
                    Enter your mobile number to get started with your account
                </p>
</div>
<div class="w-full space-y-6">
<div class="relative group">
<label class="block mb-2 text-sm font-medium text-primary/80 ml-1">Mobile Number</label>
<div class="flex items-center glass-effect rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-primary/50 transition-all border border-slate-200 dark:border-slate-800">
<div class="flex items-center px-4 py-4 border-r border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50">
<span class="text-slate-500 font-medium">+91</span>
</div>
<input class="bg-transparent w-full px-4 py-4 text-xl font-normal tracking-wider outline-none border-none focus:ring-0 placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="00000 00000" type="tel"/>
</div>
</div>
<button class="group relative w-full overflow-hidden rounded-xl bg-primary px-5 py-4 text-background-dark font-bold text-lg shadow-lg shadow-primary/20 hover:shadow-primary/40 transition-all active:scale-[0.98]">
<div class="relative z-10 flex flex-col items-center justify-center gap-0.5">
<span class="truncate">Get OTP</span>
<span class="text-[10px] opacity-70 font-medium">ओटीपी प्राप्त करें • OTP મેળવો • OTP ਪ੍ਰਾਪਤ ਕਰੋ</span>
</div>
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
</button>
<div class="flex items-center gap-4 py-4">
<div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
<span class="text-xs font-medium text-slate-400 uppercase tracking-widest">or continue with</span>
<div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 rounded-xl glass-effect border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
<span class="material-symbols-outlined text-xl">google</span>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl glass-effect border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
<span class="text-sm font-semibold">Email</span>
</button>
</div>
</div>
<footer class="mt-12 text-center">
<p class="text-slate-500 text-sm">
                    By continuing, you agree to our <br/>
<a class="text-primary hover:underline underline-offset-4" href="#">Terms of Service</a> &amp; <a class="text-primary hover:underline underline-offset-4" href="#">Privacy Policy</a>
</p>
</footer>
</main>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-[80px]"></div>
</div>
</body></html>
