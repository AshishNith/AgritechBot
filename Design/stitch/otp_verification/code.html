<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#52b781",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151d19",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>OTP Verification</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<nav class="flex items-center justify-between p-4 max-w-md mx-auto w-full">
<button class="p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h2 class="text-lg font-semibold tracking-tight">OTP Verification</h2>
<div class="w-10"></div> <!-- Spacer for centering -->
</nav>
<main class="flex-1 flex flex-col items-center justify-center px-6 max-w-md mx-auto w-full pb-20">
<!-- Icon/Visual Header -->
<div class="mb-8 p-6 rounded-full bg-primary/10">
<span class="material-symbols-outlined text-primary text-5xl">shield_person</span>
</div>
<!-- Heading Section -->
<div class="text-center space-y-2 mb-10">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Enter the code</h1>
<p class="text-slate-600 dark:text-primary/70 text-base font-medium">
                सत्यापित करें / ચકાસો / ਤਸਦੀਕ ਕਰੋ
            </p>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-4">
                We've sent a 6-digit code to <span class="font-semibold text-slate-900 dark:text-slate-100">+91 ••••• ••421</span>
</p>
</div>
<!-- OTP Input Fieldset -->
<div class="w-full mb-10">
<fieldset class="flex justify-between gap-2 sm:gap-4">
<input class="w-full h-16 text-2xl text-center bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-bold text-primary" inputmode="numeric" maxlength="1" pattern="\d{1}" type="text"/>
<input class="w-full h-16 text-2xl text-center bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-bold text-primary" inputmode="numeric" maxlength="1" pattern="\d{1}" type="text"/>
<input class="w-full h-16 text-2xl text-center bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-bold text-primary" inputmode="numeric" maxlength="1" pattern="\d{1}" type="text"/>
<input class="w-full h-16 text-2xl text-center bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-bold text-primary" inputmode="numeric" maxlength="1" pattern="\d{1}" type="text"/>
<input class="w-full h-16 text-2xl text-center bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-bold text-primary" inputmode="numeric" maxlength="1" pattern="\d{1}" type="text"/>
<input class="w-full h-16 text-2xl text-center bg-white dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-bold text-primary" inputmode="numeric" maxlength="1" pattern="\d{1}" type="text"/>
</fieldset>
<div class="mt-6 text-center">
<button class="text-primary font-semibold hover:underline decoration-2 underline-offset-4">
                    Didn't receive the code? Resend
                </button>
</div>
</div>
<!-- Primary Verification Button -->
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-slate-900 font-bold text-lg rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
<span class="block">Verify</span>
<span class="text-sm opacity-80 font-normal">सत्यापित करें / ચકાસો / ਤਸਦੀਕ ਕਰੋ</span>
</button>
<!-- Help/Footer -->
<div class="mt-12 text-center text-slate-500 dark:text-slate-400 text-sm">
<div class="flex items-center justify-center gap-2 mb-2">
<span class="material-symbols-outlined text-base">lock</span>
<span>Secure, encrypted connection</span>
</div>
<p>Step 2 of 3</p>
</div>
</main>
<!-- Visual Element: Decorative Gradients -->
<div class="fixed top-0 left-0 -z-10 w-full h-64 bg-gradient-to-b from-primary/10 to-transparent"></div>
<div class="fixed bottom-0 right-0 -z-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
</body></html>
