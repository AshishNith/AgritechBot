<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Anaaj AI - Voice Assistant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c5f20",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f14",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .waveform-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 120px;
        }
        .waveform-bar {
            width: 6px;
            background-color: #1c5f20;
            border-radius: 9999px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark sticky top-0 z-50">
<button class="flex items-center justify-center p-2 text-primary dark:text-primary-light">
<span class="material-symbols-outlined text-2xl" data-icon="close">close</span>
</button>
<div class="flex flex-col items-center">
<span class="text-sm font-bold tracking-widest text-primary uppercase">Anaaj AI</span>
<div class="flex items-center gap-1">
<div class="size-2 bg-primary rounded-full"></div>
<span class="text-xs font-medium text-primary">Voice Mode</span>
</div>
</div>
<button class="flex items-center justify-center p-2 text-primary">
<span class="material-symbols-outlined text-2xl" data-icon="help">help</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 py-8 text-center max-w-lg mx-auto w-full">
<!-- Status Message -->
<h2 class="text-2xl md:text-3xl font-bold leading-tight mb-4 text-slate-900 dark:text-slate-100">
            I am listening. Tell me about your crop problem.
        </h2>
<!-- Real-time Transcription Placeholder -->
<div class="bg-primary/10 dark:bg-primary/20 rounded-xl p-6 w-full mb-12 min-h-[100px] flex items-center justify-center border border-primary/20">
<p class="text-lg italic text-slate-700 dark:text-slate-300">
                "Tell me about your crop problem..."
            </p>
</div>
<!-- Waveform Visualizer Area -->
<div class="w-full flex flex-col items-center justify-center grow py-10">
<div class="waveform-container mb-4">
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-16"></div>
<div class="waveform-bar h-24"></div>
<div class="waveform-bar h-32"></div>
<div class="waveform-bar h-20"></div>
<div class="waveform-bar h-28"></div>
<div class="waveform-bar h-14"></div>
<div class="waveform-bar h-22"></div>
<div class="waveform-bar h-10"></div>
</div>
<p class="text-primary font-medium tracking-wide animate-pulse">LISTENING</p>
</div>
<!-- Action Area -->
<div class="w-full pb-10">
<div class="flex flex-col items-center gap-6">
<!-- Large Stop Button -->
<button class="bg-red-600 hover:bg-red-700 text-white rounded-full p-8 shadow-xl shadow-red-600/20 transition-transform active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl" data-icon="stop">stop</span>
</button>
<p class="text-slate-500 dark:text-slate-400 text-sm">Tap to stop or say "Finish"</p>
</div>
</div>
</main>
<!-- Context Image (Optional / Decorative) -->
<div class="w-full px-6 pb-8">
<div class="aspect-[21/9] rounded-xl overflow-hidden shadow-sm bg-primary/5">
<div class="w-full h-full bg-center bg-no-repeat bg-cover opacity-60 mix-blend-multiply dark:mix-blend-normal" data-alt="Healthy green crop field rows stretching to horizon" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBoeKhQ41FDQBeJm69mqxiR63J_NQP3FBUZBSsqEO2NxcjBoT1ogatJi7hUT3Dvu4jnBPfGTx3euFlcs4qaGBZRtRuoDNkoP-zw7dfOyrgO4aVlTYembmXML-nM0JyDIWLM7Sk7UHvsS_aPAa4t_KHY4_KjoPLeqfq_5GDij4iJWmu2At41QiADb0_dYTGM11eG_dvfhFXfaLQtqp3yfZkaTg9WM4jD0tG2H9ujwK9zWakH_Id1YqGilCSyas5cxT5GM-1ug8OEL1c");'>
</div>
</div>
</div>
<!-- Quick Phrases / Suggestions -->
<footer class="w-full bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 p-4">
<div class="flex gap-3 overflow-x-auto no-scrollbar">
<button class="whitespace-nowrap px-4 py-2 bg-primary/10 text-primary rounded-full text-sm font-medium border border-primary/20">
                Wheat leaf rust
            </button>
<button class="whitespace-nowrap px-4 py-2 bg-primary/10 text-primary rounded-full text-sm font-medium border border-primary/20">
                Pest control
            </button>
<button class="whitespace-nowrap px-4 py-2 bg-primary/10 text-primary rounded-full text-sm font-medium border border-primary/20">
                Irrigation help
            </button>
<button class="whitespace-nowrap px-4 py-2 bg-primary/10 text-primary rounded-full text-sm font-medium border border-primary/20">
                Fertilizer tips
            </button>
</div>
</footer>
</body></html>
