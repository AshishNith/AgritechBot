server {
    server_name backend.goran.in;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Request size limit (10MB for image uploads)
    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — AI requests (Gemini + tools + TTS) can take 60-90s
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffering for large AI responses
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # Health Check (no logging)
    location /health {
        proxy_pass http://localhost:4000/health;
        access_log off;
    }

    # SSL managed by Certbot (auto-configured on VPS)
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/backend.goran.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.goran.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = backend.goran.in) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name backend.goran.in;
    return 404;
}
